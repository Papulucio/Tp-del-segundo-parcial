<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matanza Gaming - Inicio</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/index.css">
    <link rel="shortcut icon" href="assets/img/favicon.ico" type="image/x-icon">

</head>
<body>

    <header>
        <div class="logo">
            <a href="index.html" class="logo-container">
                <img src="assets/img/logo.png" alt="logo matanza gaming">
                <h1 class="app-name">MATANZA GAMING</h1>
            </a>
        </div>

        <div class="student-credits">
            <p>Desarrollado por: <strong>Luciano Juárez</strong> y <strong>Facundo Romero</strong></p>
        </div>

        <ul class="enlaces">
            <li class="enlace">
                <a href="index.html" class="active">
                    <span>🏠 Inicio</span>
                </a>
            </li>

            <li class="enlace">
                <a href="productos.html">
                    <span>🕹️ Catálogo</span>
                </a>
            </li>

            <li class="enlace">
                <a href="carrito.html">
                    <span>🛒 Mi Pedido</span>
                </a>
            </li>

            <li class="enlace">
                <a href="http://localhost:3000/login">
                    <span>Panel Admin</span>
                </a>
            </li>
        </ul>
    </header>

    <main class="hero-container">
        <div class="welcome-box">
            <h2>¡BIENVENIDO A LA EXPERIENCIA GAMER!</h2>
            <p>Por favor, ingresá tu nombre para iniciar tu orden en el tótem de autoservicio.</p>
            
            <div class="input-group">
                <input class="input-nombre" type="text" id="nombre-cliente" placeholder="Tu nombre aquí...">
            </div>

            <button onclick="guardarNombreEIniciar()" class="btn-start"">🕹️ INICIAR MI PEDIDO</button>
        </div>
    </main>

    <button id="theme-toggle" class="theme-toggle-btn">🌙 Modo Oscuro</button>

    <script src="js/index.js"> </script>
    <script src="js/tema.js"> </script>
