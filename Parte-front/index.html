<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matanza Gaming - Inicio</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="shortcut icon" href="assets/img/favicon.ico" type="image/x-icon">
</head>
<body>

    <header>
        <div class="logo">
            <a href="index.html" class="logo-container">
                <img src="assets/img/logo.png" alt="logo matanza gaming">
                <h1 class="app-name">Gamer Zone</h1>
            </a>
        </div>

        <div class="student-credits">
            <p>Desarrollado por: <strong>Luciano Juárez</strong> y <strong>Facundo Romero</strong></p>
        </div>

        <ul class="enlaces">
            <li class="enlace">
                <a href="index.html" class="active">
                    <span>🏠 Inicio</span>
                </a>
            </li>

            <li class="enlace">
                <a href="productos.html">
                    <span>🕹️ Catálogo</span>
                </a>
            </li>

            <li class="enlace">
                <a href="carrito.html">
                    <span>🛒 Mi Pedido</span>
                </a>
            </li>
        </ul>
    </header>

    <main class="hero-container">
        <div class="welcome-box">
            <h2>¡BIENVENIDO A LA EXPERIENCIA GAMER!</h2>
            <p>Por favor, ingresá tu nombre para iniciar tu orden en el tótem de autoservicio.</p>
            
            <div class="input-group" style="margin-bottom: 25px;">
                <input type="text" id="nombre-cliente" placeholder="Tu nombre aquí..." style="padding: 12px; width: 100%; max-width: 300px; border-radius: 6px; border: 1px solid #222226; background: #0d0d0e; color: white; text-align: center; font-size: 1rem;">
            </div>

            <button onclick="guardarNombreEIniciar()" class="btn-start" style="cursor: pointer; border: none;">🕹️ INICIAR MI PEDIDO</button>
        </div>
    </main>

    <script>
        function guardarNombreEIniciar() {
            const nombre = document.getElementById("nombre-cliente").value.trim();
            if (!nombre) {
                alert("Por favor, ingresá tu nombre antes de comenzar.");
                return;
            }
            localStorage.setItem("nombre-cliente", nombre);
            window.location.href = "productos.html";
        }
    </script>
</body>
</html>
