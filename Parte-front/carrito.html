<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matanza Gaming - Tu Pedido</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/carrito.css">  

</head>
<body>

    <header>
        <div class="logo">
            <a href="index.html" class="logo-container">
                <img src="assets/img/logo.png" alt="logo matanza gaming">
                <h1 class="app-name">MATANZA GAMING</h1>
            </a>
        </div>

        <div class="student-credits">
            <p>Desarrollado por: <strong>Luciano Juárez</strong> y <strong>Facundo Romero</strong></p>
        </div>

        <ul class="enlaces">
            <li class="enlace">
                <a href="productos.html">
                    <span>🕹️ Catálogo</span>
                </a>
            </li>

            <li class="enlace">
                <a href="carrito.html">
                    <span>🛒 Mi Pedido</span>
                </a>
            </li>
        </ul>
    </header>

    <main class="hero-container">
        <div class="welcome-box">
            <h3>🛒 Detalle de tu Pedido</h3>
            
            <div id="pantalla-carrito-items">
                </div>

            <div class="cart-total">
                <span>Total a Pagar:</span>
                <span id="cart-total-txt">$0</span>
            </div>

            <button type="button" onclick="procesarCompraFinal()" class="btn-checkout">🔥 GENERAR MI TICKET DE COMPRA</button>
        </div>
    </main>

    <button id="theme-toggle" class="theme-toggle-btn">☀️ Modo Claro</button>

    <script src="js/carrito.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/tema.js"></script>
</body>
</html>
