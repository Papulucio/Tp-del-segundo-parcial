<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamer Zone - Tu Pedido</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <header>
        <div class="logo">
            <a href="index.html" class="logo-container">
                <img src="assets/img/logo.png" alt="logo matanza gaming">
                <h1 class="app-name">Gamer Zone</h1>
            </a>
        </div>

        <div class="student-credits">
            <p>Desarrollado por: <strong>Luciano Juárez</strong> y <strong>Facundo Romero</strong></p>
        </div>

        <ul class="enlaces">
            <li class="enlace">
                <a href="productos.html">
                    <span>🕹️ Catálogo</span>
                </a>
            </li>

            <li class="enlace">
                <a href="carrito.html">
                    <span>🛒 Mi Pedido</span>
                </a>
            </li>
        </ul>
    </header>

    <main class="hero-container" style="align-items: flex-start; padding-top: 40px;">
        <div class="welcome-box" style="width: 100%; max-width: 600px; text-align: left;">
            <h3 style="color: #72CCEF; font-size: 1.5rem; margin-bottom: 20px; border-bottom: 1px solid #222226; padding-bottom: 10px;">🛒 Detalle de tu Pedido</h3>
            
            <div id="pantalla-carrito-items">
                </div>

            <div class="cart-total" style="display: flex; justify-content: space-between; font-size: 1.4rem; font-weight: bold; margin: 20px 0; padding-top: 15px; border-top: 1px solid #222226;">
                <span>Total a Pagar:</span>
                <span id="cart-total-txt">$0</span>
            </div>

            <button onclick="procesarCompraFinal()" class="btn-checkout" style="font-size: 1.1rem; padding: 15px;">🔥 GENERAR MI TICKET DE COMPRA</button>
        </div>
    </main>

    <button id="theme-toggle" style="position: fixed; bottom: 20px; right: 20px; padding: 12px 20px; background-color: #111; color: #fff; border: 2px solid #fff; border-radius: 30px; font-weight: bold; cursor: pointer; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.5);">☀️ Modo Claro</button>

    <script src="carrito.js"></script>
    <script src="auth.js"></script>
    <script src="tema.js"></script>
    
</body>
</html>
