<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matanza Gaming - Ticket de Compra</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/ticket.css">

</head>
<body>

    <header>
        <div class="logo">
            <a href="index.html" class="logo-container">
                <img src="assets/img/logo.png" alt="logo matanza gaming">
                <h1 class="app-name">MATANZA GAMING</h1>
            </a>
        </div>

        <div class="student-credits">
            <p>Desarrollado por: <strong>Luciano Juárez</strong> y <strong>Facundo Romero</strong></p>
        </div>

        <ul class="enlaces">
            <li class="enlace">
                <a href="index.html" class="active">
                    <span>🏠 Inicio</span>
                </a>
            </li>

            <li class="enlace">
                <a href="productos.html">
                    <span>🕹️ Catálogo</span>
                </a>
            </li>

            <li class="enlace">
                <a href="carrito.html">
                    <span>🛒 Mi Pedido</span>
                </a>
            </li>
        </ul>
    </header>

    <main class="ticket-container">
        <div class="ticket-card">
            <div class="ticket-header">
                <h3>GRACIAS POR TU COMPRA</h3>
                <p>Retirá tu pedido por el mostrador</p>

                <p class="ticket-client">CLIENTE: <span id="ticket-cliente" class="ticket-client-name">---</span></p>

                <div class="order-number">
                    <span>SU NÚMERO DE PEDIDO ES</span>
                    <h2 id="ticket-id">#---</h2>
                </div>
            </div>
            
            <hr class="ticket-divider">
            
            <div id="ticket-detalle" class="ticket-details"></div>
            
            <hr class="ticket-divider">

            <div class="ticket-footer">
                <p class="ticket-footer-brand">MATANZA GAMING</p>
                <p id="ticket-fecha" class="ticket-date">FECHA: --/--/----</p>

                <p>¡Que disfrutes tu compra!</p>

                <button id="btn-descargar-pdf">📄 Descargar Ticket PDF</button>

                <a href="index.html" class="btn-back-totem" onclick="limpiarPedido()">SALIR</a>
            </div>
        </div>
    </main>

    <button id="theme-toggle" class="theme-toggle-btn">☀️ Modo Claro</button>

    <script src="js/ticket.js"></script>
    <script src="js/tema.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</body>
</html>
