<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <link rel="shortcut icon" href="assets/img/favicon.ico" type="image/x-icon">

    <link rel="stylesheet" href="css/delete.css">
</head>
<body>
    <header>
        <div class="logo">
            <a href="index.html" class="logo-container">
                <img src="assets/img/logo.jpg" alt="">
            </a>
        </div>

        <ul class="enlaces">
            <li class="enlace">
                <a href="index.html">
                    <span>VER</span>
                </a>
            </li>

            <li class="enlace">
                <a href="get.html">
                    <span>CONSULTAR</span>
                </a>
            </li>

            <li class="enlace">
                <a href="post.html">
                    <span>CREAR</span>
                </a>
            </li>

            <li class="enlace">
                <a href="put.html">
                    <span>MODIFICAR</span>
                </a>
            </li>

            <li class="enlace">
                <a href="delete.html">
                    <span>ELIMINAR</span>
                </a>
            </li>
        </ul>
    </header>

    <main>

        <section class="form-productos">
            <h2>Consulte un producto por su ID: </h2>

            <form id="getProducto-form">
                <label for="idProd">ID del producto</label>
                <input type="number" name="idProd" id="idProd" required>
                <input type="submit" value="Consultar producto" class="boton">
            </form>
            <div id="contenedor-productos">

            </div>
        </section>
    </main>

<script>
        const contenedorProductos = document.getElementById("contenedor-productos");
        const getProductForm = document.getElementById("getProducto-form");

        getProductForm.addEventListener("submit", async event => {
            event.preventDefault(); //Evitamos el envio por defecto HTML del formulario

            // Extraemos el id del producto
            const idProd = event.target.idProd.value.trim();
            
            try {
                const response = await fetch(`http://localhost:3000/api/productos/${idProd}`);
                console.log(response);

                const datos = await response.json();
                console.log(datos);

                const producto = datos.payload[0];

                console.log(producto); 

                renderizarProducto(producto);

            } catch (error) {
                console.error("Error al obtener el producto");
            }
        });

        function renderizarProducto(producto) {
            let htmlProducto = `
            <ul>
                <li class="lista-producto">
                    <img src="${producto.imagen}" alt="${producto.nombre}">
                    <p>Id: ${producto.id} / Nombre: ${producto.nombre} / <strong>Precio: $${producto.precio}</strong></p>
                    <input type="button" id="borrarProducto-boton" value="Eliminar Producto">
                </li>
            </ul>
            `;

            contenedorProductos.innerHTML = htmlProducto;

            const deleteProductButton = document.getElementById("borrarProducto-boton");

            deleteProductButton.addEventListener("click", event => {
                event.stopPropagation();

                const confirmacion = confirm("Querés eliminar este producto?");

                if(!confirmacion) {
                    alert("Eliminacion cancelada");
                } else {
                    eliminarProducto(producto.id);
                }
            });
        }

        // Funcion para realizar una operacion delete
        async function eliminarProducto(id) {
            try {
                const response = await fetch(`http://localhost:3000/api/productos/${id}`, {
                    method: "DELETE"
                });

                const result = await response.json();

                alert(result.message);
                console.log(result.message);

                // Limpiamos visualmente el producto que eliminamos de la pantalla
                contenedorProductos.innerHTML = "";

            } catch (error) {
                console.error("Error en la solicitud DELETE: ", error);
                alert("Ocurrio un error al eliminar un producto");
            }
        }
        
    </script>
</body>
</html>
