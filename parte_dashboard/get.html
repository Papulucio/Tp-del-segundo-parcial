<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <link rel="shortcut icon" href="assets/img/favicon.ico" type="image/x-icon">

    <link rel="stylesheet" href="css/get.css">
</head>
<body>
    <header>
        <div class="logo">
            <a href="index.html" class="logo-container">
                <img src="assets/img/logo.jpg" alt="">
            </a>
        </div>

        <ul class="enlaces">
            <li class="enlace">
                <a href="index.html">
                    <span>VER</span>
                </a>
            </li>

            <li class="enlace">
                <a href="get.html">
                    <span>CONSULTAR</span>
                </a>
            </li>

            <li class="enlace">
                <a href="post.html">
                    <span>CREAR</span>
                </a>
            </li>

            <li class="enlace">
                <a href="put.html">
                    <span>MODIFICAR</span>
                </a>
            </li>

            <li class="enlace">
                <a href="delete.html">
                    <span>ELIMINAR</span>
                </a>
            </li>
        </ul>
    </header>

    <main>

        <section class="form-productos">
            <h2>Consulte un producto por su ID: </h2>

            <form id="getProducto-form">
                <label for="idProd">ID del producto</label>
                <input type="number" name="idProd" id="idProd" required>
                <input type="submit" value="Consultar producto" class="boton">
            </form>
            <div id="contenedor-productos">

            </div>
        </section>
    </main>

<script>
    const contenedorProductos = document.getElementById("contenedor-productos");
    const getProductoForm = document.getElementById("getProducto-form");
    const URL_PRODUCTOS = "http://localhost:3000/api/productos";

    function mostrarError(message) {
    contenedorProductos.innerHTML = `
        <p class="mensaje mensaje-error">${message}</p>
    `;
}
    
    getProductoForm.addEventListener("submit", async event => {
        event.preventDefault();

        const idProd = event.target.idProd.value.trim();

        if (!idProd) {
            mostrarError("Ingresá un ID valido");
        return;
    }
    
        try {
            let respuesta = await fetch(`${URL_PRODUCTOS}/${idProd}`);
            let data = await respuesta.json();

            if (!respuesta.ok) {
                mostrarError(data.message || data.error);
                return;
            }

            let producto = data.payload[0];

            const htmlProducto = `
                <div class="card-producto">
                    <img src="${producto.imagen}" alt="${producto.nombre}">
                    <h4>${producto.nombre}</h4>
                    <p>Id: ${producto.id}</p>
                    <p>Categoria: ${producto.categoria}</p>
                    <p>$${producto.precio}</p>
                </div>
            `;
            
            contenedorProductos.innerHTML = htmlProducto;

        } catch (error) {
            console.error("error al obtener el producto: ", error);
            mostrarError("Error de conexion con el servidor");
        }
    });

</script>
