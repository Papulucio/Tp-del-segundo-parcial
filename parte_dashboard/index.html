<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <link rel="shortcut icon" href="assets/img/favicon.ico" type="image/x-icon">

    <link rel="stylesheet" href="css/index.css">
</head>
<body>
    <header>
        <div class="logo">
            <a href="index.html" class="logo-container">
                <img src="assets/img/logo.jpg" alt="logo matanza gaming">
            </a>
        </div>

        <ul class="enlaces">
            <li class="enlace">
                <a href="index.html">
                    <span>VER</span>
                </a>
            </li>

            <li class="enlace">
                <a href="get.html">
                    <span>CONSULTAR</span>
                </a>
            </li>

            <li class="enlace">
                <a href="post.html">
                    <span>CREAR</span>
                </a>
            </li>

            <li class="enlace">
                <a href="put.html">
                    <span>MODIFICAR</span>
                </a>
            </li>

            <li class="enlace">
                <a href="delete.html">
                    <span>ELIMINAR</span>
                </a>
            </li>
        </ul>
    </header>

    <main>

        <section class="seccion-productos">
            <h2>Nuestros productos</h2>
            <div id="contenedor-productos">
            </div>
        </section>
    </main>

<script>
    const contenedorProductos = document.getElementById("contenedor-productos");
    const URL_PRODUCTOS = "http://localhost:3000/api/productos"

// Optimización 1: Mostramos mensaje de error visualmente
function mostrarError(message) {
        contenedorProductos.innerHTML = `
        <p class="mensaje mensaje-error">${message}</p>
    `;
}


async function mostrarProductos() {
    try {
        const respuesta = await fetch(URL_PRODUCTOS);
        const formato = await respuesta.json();

        // Optimización 2: Muestro mensaje de error si la respuesta != 200
        if (!respuesta.ok) {
            mostrarError(formato.message || formato.error);
            return;
        }

        let productos = formato.payload;
        console.log(productos);
        renderizarProductos(productos)

    } catch(error) {
        console.error(error);
        mostrarError("Error de conexión con el servidor");
    }
}

function renderizarProductos(array) {
    let htmlProducto = "";

        array.forEach(producto => {
            htmlProducto += `
            <div class="card-producto">
                <img src="${producto.imagen}" alt="${producto.nombre}">
                <h4>${producto.nombre}</h4>
                <p>Id: ${producto.id}</p>
                <p>Categoria: ${producto.categoria}</p>
                <p>$${producto.precio}</p>
            </div>
            `;
    });
    
    contenedorProductos.innerHTML = htmlProducto;
}

mostrarProductos()
</script>
</html>
